name: Build canonical data

on:
  workflow_dispatch:
  schedule:
    - cron: "31 * * * *"

concurrency:
  group: spotify-canonical-data
  cancel-in-progress: false

permissions:
  contents: write

env:
  SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
  SPOTIFY_AUTH_STRING: ${{ secrets.SPOTIFY_AUTH_STRING }}
  SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
  REDIRECT_URI: ${{ secrets.REDIRECT_URI }}

jobs:
  build-canonical-data:
    runs-on: ubuntu-latest
    steps:
      - name: Check out canonical data repo
        uses: actions/checkout@v6
        with:
          path: my-spotify-data
          fetch-depth: 0
      - name: Check out legacy scraper source
        uses: actions/checkout@v6
        with:
          repository: chekos/spotify-git-scraping
          ref: main
          path: spotify-git-scraping
          fetch-depth: 0
      - name: Check out legacy export source
        uses: actions/checkout@v6
        with:
          repository: chekos/my-esporifai
          ref: main
          path: my-esporifai
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install Spotify dependencies
        working-directory: my-spotify-data
        run: pip install -r requirements.txt
      - name: Ensure Spotify auth works
        working-directory: my-spotify-data
        run: |-
          esporifai auth --status
          esporifai auth --force
      - name: Fetch current recently played snapshot
        working-directory: my-spotify-data
        run: |-
          esporifai get-recently-played before "$(date +"%Y-%m-%d %T")" --limit 50 --time-zone UTC --output data/recently_played.json --trim
      - name: Test canonical builder
        working-directory: my-spotify-data
        run: python -m unittest discover -s tests -p 'test_*.py'
      - name: Build canonical data
        working-directory: my-spotify-data
        run: python scripts/build_canonical_data.py --enrich-missing-tracks
      - name: Commit and push if canonical data changed
        working-directory: my-spotify-data
        run: |-
          git config user.name "Automated"
          git config user.email "actions@users.noreply.github.com"
          git restore data/recently_played.json
          git add \
            data/listening_events.jsonl \
            data/track_catalog.jsonl \
            data/album_catalog.jsonl \
            data/artist_catalog.jsonl \
            data/audit/canonical_data_audit.json \
            data/audit/canonical_data_audit.md
          timestamp=$(date -u)
          git commit -m "Latest canonical data: ${timestamp}" || exit 0
          git pull --rebase origin main
          git push
