name: Get Recently Played Tracks

on:
  workflow_dispatch:
  schedule:
    - cron: "13 * * * *"

concurrency:
  group: spotify-data-update
  cancel-in-progress: false

permissions:
  contents: write

env:
  SPOTIFY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
  SPOTIFY_AUTH_STRING: ${{ secrets.SPOTIFY_AUTH_STRING }}
  SPOTIFY_REFRESH_TOKEN: ${{ secrets.SPOTIFY_REFRESH_TOKEN }}
  REDIRECT_URI: ${{ secrets.REDIRECT_URI }}

jobs:
  scheduled:
    runs-on: ubuntu-latest
    steps:
    - name: Check out repo
      uses: actions/checkout@v6
      with:
        fetch-depth: 0
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.12'
        cache: pip
    - name: Install python dependencies
      run: |-
        pip install -r requirements.txt
    - name: Ensure auth works
      run: |-
        esporifai auth --status
        esporifai auth --force
    - name: Get tracks played in the last hour
      run: |-
        esporifai get-recently-played before "$(date +"%Y-%m-%d %T")" --limit 50 --time-zone UTC --output data/recently_played.json --trim
    - name: Commit and push if it changed 
      run: |-
        git config user.name "Automated"
        git config user.email "actions@users.noreply.github.com"
        git add -A
        timestamp=$(date -u)
        git commit -m "Latest data: ${timestamp}" || exit 0
        git pull --rebase origin main
        git push
